# Flatpak manifest for Spekter.
#
# Regenerate cargo-sources.json whenever Cargo.lock changes:
#   python3 -m venv .gen-venv && .gen-venv/bin/pip install aiohttp tomlkit
#   curl -O https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py
#   .gen-venv/bin/python flatpak-cargo-generator.py ../Cargo.lock -o cargo-sources.json
#
# Build and install locally:
#   flatpak-builder --user --install --force-clean build-dir flatpak/org.babelserver.spekter.yaml

id: org.babelserver.spekter

runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: spekter

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # No --filesystem access: files and directories are opened through the
  # XDG FileChooser portal, which grants access only to what the user picks.

modules:
  - name: spekter
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/spekter/cargo
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --verbose -p spekter
      - install -Dm755 target/release/spekter /app/bin/spekter
      - install -Dm644 flatpak/org.babelserver.spekter.desktop
          /app/share/applications/org.babelserver.spekter.desktop
      - install -Dm644 flatpak/org.babelserver.spekter.metainfo.xml
          /app/share/metainfo/org.babelserver.spekter.metainfo.xml
      - install -Dm644 assets/icon-256.png
          /app/share/icons/hicolor/256x256/apps/org.babelserver.spekter.png
      - install -Dm644 assets/icon.svg
          /app/share/icons/hicolor/scalable/apps/org.babelserver.spekter.svg
      - install -Dm644 assets/spekter-symbolic.svg
          /app/share/icons/hicolor/symbolic/apps/org.babelserver.spekter-symbolic.svg
    sources:
      # Bump tag + commit on every release. To build local changes
      # instead, temporarily swap this for: { type: dir, path: .. }
      - type: git
        url: https://gitlab.com/hallyhaa/spekter.git
        tag: v1.2.1
        commit: b578e88eb0db62fcc34cc09e93c24b433a9b7041
      - cargo-sources.json
